packages:
  - "apps/*"
  - "packages/*"
  - "scripts/*"

# pnpm 11 reads config here, NOT .npmrc. Expo/RN Gradle autolinking requires a
# flat npm-style tree (isolated symlinks break the :expo module classpath wiring).
nodeLinker: hoisted

allowBuilds:
  '@sentry/cli': true # downloads the sentry-cli binary (source-map upload at build)
  core-js: false # postinstall is a funding banner only
  esbuild: true
  sharp: true
